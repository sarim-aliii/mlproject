{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        
        {% if result %}
        <div class="alert alert-success text-center shadow-sm" role="alert">
            <h4 class="alert-heading"><i class="fas fa-check-circle"></i> Prediction Complete!</h4>
            <p class="mb-0">The estimated Math Score is: <strong>{{ result }}</strong></p>
        </div>
        {% endif %}

        <div class="card shadow-lg border-0 rounded-lg">
            <div class="card-header bg-primary text-white text-center py-3">
                <h3 class="font-weight-light my-2">Exam Performance Predictor</h3>
            </div>
            <div class="card-body p-5">
                <form action="{{ url_for('predict_datapoint')}}" method="post">
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <div class="form-floating mb-3 mb-md-0">
                                <select class="form-select" name="gender" required>
                                    <option value="" disabled selected>Select Gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                </select>
                                <label>Gender</label>
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <div class="form-floating">
                                <select class="form-select" name="ethnicity" required>
                                    <option value="" disabled selected>Select Ethnicity</option>
                                    <option value="group A">Group A</option>
                                    <option value="group B">Group B</option>
                                    <option value="group C">Group C</option>
                                    <option value="group D">Group D</option>
                                    <option value="group E">Group E</option>
                                </select>
                                <label>Race or Ethnicity</label>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <div class="form-floating mb-3 mb-md-0">
                                <select class="form-select" name="parental_level_of_education" required>
                                    <option value="" disabled selected>Select Education</option>
                                    <option value="associate's degree">Associate's Degree</option>
                                    <option value="bachelor's degree">Bachelor's Degree</option>
                                    <option value="high school">High School</option>
                                    <option value="master's degree">Master's Degree</option>
                                    <option value="some college">Some College</option>
                                    <option value="some high school">Some High School</option>
                                </select>
                                <label>Parental Level of Education</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <select class="form-select" name="lunch" required>
                                    <option value="" disabled selected>Select Lunch Type</option>
                                    <option value="free/reduced">Free/Reduced</option>
                                    <option value="standard">Standard</option>
                                </select>
                                <label>Lunch Type</label>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <div class="form-floating">
                                <select class="form-select" name="test_preparation_course" required>
                                    <option value="" disabled selected>Select Course Status</option>
                                    <option value="none">None</option>
                                    <option value="completed">Completed</option>
                                </select>
                                <label>Test Preparation Course</label>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <div class="form-floating mb-3 mb-md-0">
                                <input class="form-control" type="number" name="writing_score" placeholder="0-100" min="0" max="100" required />
                                <label>Writing Score (0-100)</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input class="form-control" type="number" name="reading_score" placeholder="0-100" min="0" max="100" required />
                                <label>Reading Score (0-100)</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <input class="btn btn-primary btn-lg" type="submit" value="Predict Math Score" />
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
